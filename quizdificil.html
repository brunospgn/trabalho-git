<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Fácil</title>
    <link rel="icon" href="assets/icon.png">
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <div class="card">
        <div class="hd-container">
            <p class="texto" id="quiz-nivel">
                "Nível do quiz"
            </p>

            <p class="texto" id="progresso">
                1/10
            </p>
        </div>

        <div class="pergunta-container">
            <p class="texto" id="pergunta">
                "pergunta"
            </p>
        </div>

        <div class="btn-container">
            <button class="btn" id="asw-1">
                "resposta 1"
            </button>

            <button class="btn" id="asw-2">
                "resposta 2"
            </button>

            <button class="btn" id="asw-3">
                "resposta 3"
            </button>

            <button class="btn" id="asw-4">
                "resposta 4"
            </button>
        </div>
    </div>
    
    <script src="quizdificil.js"></script>
</body>
</html>
